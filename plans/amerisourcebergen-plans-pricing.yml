description: >-
  AmerisourceBergen (now operating as Cencora) does not publish a public
  developer API or pricing catalog. Customer integrations (EDI, ordering,
  inventory, returns) are bilateral, governed by master distribution agreements
  rather than published API plan tiers. There is no free quota, metered
  request price, or self-service enterprise SKU to reconcile.
notes: >-
  No public developer plan catalog exists. EDI / ordering integrations are
  contracted directly. If Cencora launches a public developer program, replace
  this scaffold with reconciled tier data.
sources:
  - https://www.cencora.com
  - https://www.amerisourcebergen.com
