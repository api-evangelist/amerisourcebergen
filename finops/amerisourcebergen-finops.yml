description: >-
  FOCUS-aligned FinOps placeholder for AmerisourceBergen / Cencora. There is no
  developer API metered billing surface; pharmaceutical distribution is
  invoiced as cost-of-goods plus distribution fees under master agreements,
  outside the scope of API FinOps.
notes: >-
  No public API billing surface. Charges flow through distribution agreements
  rather than per-request invoices.
