principles:
  - name: Visibility
    description: >-
      Cencora customers see consumption through EDI usage reporting and
      ordering portals, not through a public usage API.
  - name: Allocation
    description: >-
      Allocate any integration costs to the supply-chain or procurement
      function that owns the Cencora relationship.
  - name: Optimization
    description: >-
      Cost levers are batching of EDI documents, order consolidation, and
      contract pricing tiers, not API request optimization.
  - name: Accountability
    description: >-
      Budget ownership sits with procurement and supply-chain leadership; FinOps
      practitioners should partner with them rather than treat this as an API
      spend line.
