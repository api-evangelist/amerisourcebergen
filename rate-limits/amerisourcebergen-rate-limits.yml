description: >-
  AmerisourceBergen / Cencora does not publish public rate-limit documentation.
  EDI and ordering integrations are governed by bilateral SLAs rather than a
  public per-key throttling contract. There are no documented 429 semantics or
  per-second ceilings to reconcile.
notes: >-
  No public rate-limit documentation. Limits below are placeholders.
sources:
  - https://www.cencora.com
responseCodes: {}
limits:
  - name: No Public Rate Limit Documentation
    scope: account
    metric: varies
    limit: 'see provider; not publicly documented'
policies:
  - name: Bilateral SLA
    description: >-
      Throughput, error budgets, and retry semantics are defined by the master
      distribution / EDI agreement between Cencora and the customer.
